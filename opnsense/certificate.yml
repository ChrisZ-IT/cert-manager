---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: opnsense-cert-request
  namespace: istio-ingress
spec:
  secretName: opnsense-cert-request
  duration: 2160h
  renewBefore: 48h
  privateKey:
    rotationPolicy: Always
  commonName: opnsense01.${DOMAIN_NAME}
  dnsNames:
    - opnsense01.${DOMAIN_NAME}
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
